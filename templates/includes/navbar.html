{% load static %}
<header class="navbar">
  <a href="{% url 'hotwheels_app:home' %}" class="navbar-brand">
    <img src="{% static 'images/logo.png' %}" alt="Heat Wheels" class="navbar-logo">
    <span class="navbar-brand-name">Heat<span class="accent">Wheels</span></span>
  </a>

  <nav class="nav-links">
    <a href="{% url 'hotwheels_app:home' %}" class="nav-link">Home</a>
    <a href="{% url 'products:list' %}" class="nav-link">Browse</a>
    <a href="{% url 'hotwheels_app:about' %}" class="nav-link">About</a>
    <a href="{% url 'support:contact' %}" class="nav-link">Contact</a>
  </nav>

  <form class="navbar-search" action="{% url 'products:list' %}" method="get">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input name="q" type="search" placeholder="Search models..." autocomplete="off">
  </form>

  <div class="navbar-actions">
    <a href="{% url 'cart:detail' %}" class="btn-ghost cart-btn">
      🛒 Cart
    </a>
    {% if user.is_authenticated %}
      {% if user.is_staff %}
        <a href="{% url 'admin:index' %}" class="btn-ghost">Admin</a>
      {% else %}
        <a href="{% url 'accounts:profile' %}" class="btn-ghost">Profile</a>
        <form action="{% url 'accounts:logout' %}" method="post" style="margin:0">
          {% csrf_token %}
          <button type="submit" class="btn-teal">Logout</button>
        </form>
      {% endif %}
    {% else %}
      <a href="{% url 'accounts:login' %}" class="btn-ghost">Sign In</a>
      <a href="{% url 'accounts:register' %}" class="btn-teal">Sign Up</a>
    {% endif %}
  </div>
</header>
