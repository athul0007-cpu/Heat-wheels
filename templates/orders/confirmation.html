{% extends 'base.html' %}
{% block title %}Order Confirmed | Heat Wheels{% endblock %}
{% block content %}
<div style="min-height:70vh;display:flex;align-items:center;justify-content:center;padding:2rem">
  <div style="background:#fff;border-radius:20px;padding:3rem;border:1.5px solid #EAECF3;text-align:center;max-width:480px">
    <div style="font-size:3rem;margin-bottom:1rem">✅</div>
    <h1 style="font-size:1.5rem;font-weight:800;color:#1A1D27">Order Confirmed!</h1>
    <p style="margin-top:0.75rem;font-size:0.9rem;color:#8A8FA8">Thank you for your purchase. Your order has been placed successfully.</p>
    <div style="display:flex;gap:0.75rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap">
      <a href="{% url 'orders:history' %}" class="btn-teal">View Orders</a>
      <a href="{% url 'products:list' %}" class="btn-ghost">Continue Shopping</a>
    </div>
  </div>
</div>
{% endblock %}
