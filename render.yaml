services:
  - type: web
    name: heat-wheels
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn hotwheels_project.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: hotwheels_project.settings.production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: heat-wheels-db
          property: connectionString

databases:
  - name: heat-wheels-db
    plan: free
